[versions]
agp = "8.9.1"
buildkonfigGradlePlugin = "latest_version"
coilCompose = "2.5.0"
kotlin = "2.3.20"
compose = "1.5.4"
compose-material3 = "1.1.2"
androidx-activityCompose = "1.8.0"
kmpNativeCoroutines = "1.0.2"
kotlinxCoroutinesCore = "1.10.1"
kotlinxSerializationJson = "1.8.1"
lifecycleViewmodelKtx = "2.8.7"
material3 = "1.3.0"
navigationCompose = "2.8.9"
ktorClient = "2.3.5"
kotlinxDatetime = "0.6.2"
koin = "4.0.4"
sqlDelight = "2.0.2"
kmpObservableViewModel = "1.0.3"

[libraries]
kmp-observableviewmodel-core = { module = "com.rickclephas.kmp:kmp-observableviewmodel-core", version.ref = "kmpObservableViewModel" }
androidx-lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "lifecycleViewmodelKtx" }
androidx-material3-v130 = { module = "androidx.compose.material3:material3", version.ref = "material3" }
